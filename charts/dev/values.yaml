replicaCount: 1

image:
  repository: pauseai-es-presentaciones
  tag: latest
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 3030

ingress:
  ingressClassName: nginx
  annotations: {}
  path: /
  pathType: Prefix
  host: pauseai-es-presentaciones.local
  tls:
    issuer: ''

secret:
  # Name of existing K8s Secret containing SLIDEV_PASSWORD key
  # If empty, the chart creates one using slidevPassword value
  existingSecret: ''
  slidevPassword: ''

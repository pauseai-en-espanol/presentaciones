replicaCount: 1

image:
  repository: pauseai-es-presentaciones-static
  tag: latest
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 80

ingress:
  ingressClassName: nginx
  annotations: {}
  path: /
  pathType: Prefix
  host: pauseai-es-presentaciones-static.local
  tls:
    issuer: ''

# HTML snippet injected before </head> via nginx sub_filter.
# Set from GitOps values, e.g.:
#   headSnippet: '<script defer data-domain="pauseai.es" src="https://plausible.example.com/js/plausible.js"></script>'
headSnippet: ''

# Nginx 301 redirects for legacy URLs.
# Each entry generates a `location = <from> { return 301 <to>; }` block.
redirects: []
#  - from: /2026-03-uma-mayores-55
#    to: /riesgos-ia-uma-2026-03/
